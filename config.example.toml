# Cortex config. Live copy: ~/.config/marrow/cortex.toml (override path via CORTEX_CONFIG env)
# Missing file / missing keys -> defaults below apply (tolerant load).

[core]
timezone = "Australia/Melbourne"

[paths]
# Empty = use the default paths listed in comments.
# Default: ~/.config/marrow/marrow.db
marrow_db = ""
# Default: ~/Library/Application Support/Knowledge/knowledgeC.db
knowledgec_db = ""
# iOS Shortcuts geofence log, appended by an "arrived/left" automation.
# Lines look like "HH:MM event text"; no default, must be set to enable.
geofence_file = ""
# Health export JSON (iOS Shortcut nightly dump). No default, must be set to enable.
health_export = ""
# Pacemaker affect-flag file (JSON dict written by A1/upset lane). Default: ~/.config/marrow/cortex/affect_flag.json
affect_flag_file = ""
# Pacemaker self-schedule queue (JSON list of {due_at}). Default: ~/.config/marrow/cortex/self_schedule.json
self_schedule_file = ""
# Handoff note the next fresh window reads (assistant's handoff). Default: ~/.config/marrow/cortex/handoff.md
handoff_file = ""
# Cortex session cwd (own CLAUDE.md lives here). Default: ~/.config/marrow/cortex
cortex_home = ""
# Wishlist md, pure append-only, symlinked into NY. Default: <cortex_home>/wishlist.md
wishlist_file = ""
# NY db-pages dir wishlist.md gets symlinked into (daybrief.md is a real
# marrow-owned file here, not a cortex symlink).
ny_db_pages = ""
# Wake-latency probe log (cortex stage marks + marrow stream-event marks).
# Default: ~/.config/marrow/logs/wake_timing.log
wake_timing_log = ""
# Wake-state audit trail (alarm epoch/generation events). Byte-shared with
# marrow's [cortex].wake_audit_log_file. Default: <cortex_home>/wake_audit.log
wake_audit_log = ""
# Interactive-window (B3v) runtime files. Empty = defaults under cortex_home.
wake_state_file = ""     # awake marker + resident iTerm session id. Default: <home>/wake_state.json
wakeup_note_file = ""    # note text the window is told to Read. Default: <home>/wakeup_note.md
watchdog_pidfile = ""    # per-wake watchdog pid. Default: <home>/watchdog.pid
# Claude Code transcript dir for the window. Empty = derived from cortex_home
# (munge non-alphanumeric -> '-'). Default: ~/.claude/projects/<munged cortex_home>
transcript_dir = ""

# marrow repo invocation for the wake call (separate venv/deps from cortex).
[marrow]
repo_dir = "~/CC-Lab/marrow"
venv_python = "~/CC-Lab/marrow/.venv/bin/python"
# Inner claude-call budget (seconds), passed down to marrow's cortex runner.
# The outer subprocess kill is derived (this + a small margin), so the inner
# timeout always fires first. Keep in sync with marrow [llm.claude_cli_cortex].
call_timeout_s = 600

# Per-wake safety valve. Cap the tokens one wake may spend; a mid-stream breach
# (or the call_timeout_s wall clock above) terminates the session and rebirths a
# fresh one on the next wake. 0 disables the token cap.
[wake]
token_cap = 150000
# Wake delivery: "window" = resident interactive iTerm cli (B3v, default);
# "headless" = the marrow-subprocess call (fallback, auto-used if osascript/iTerm
# fails). The window body = one `claude` in cortex_home with MARROW_CORTEX=1
# MARROW_CHANNEL=ct set explicitly.
mode = "window"
session_name = "cortex"        # iTerm session name for the resident window
launch_command = "claude"      # command run in the window (env markers prepended)
window_model = "opus"          # explicit --model for every cortex window; never
                               # inherit the system default. Not a 1M-context variant.
window_effort = ""             # --effort (low|medium|high|xhigh|max); "" = omit flag
skip_permissions = true        # add --dangerously-skip-permissions so a fresh dir's
                               # trust dialog never blocks the injected note
ready_marker = "accept edits"  # TUI footer text signalling claude is ready for input
ready_timeout_sec = 30         # max wait for readiness after a fresh spawn
# The signal-file ear (alive-resident wake only). An already-running resident
# window has a persistent Monitor (command: "tail -n 0 -f <signal_log>", persistent: true); the pacemaker
# appends a WAKE line to wake it (no keyboard typing). ear_timeout_sec = how
# long a wake is given to land (transcript grows) before the resident is
# replaced by a FRESH window that gets the note as its first prompt.
signal_log = ""                # Default: <cortex_home>/wake_signal.log
ear_timeout_sec = 90           # recovery deadline for an alive-window wake to land before respawn
# A fresh window (rotate / dead resident / ear miss) is spawned with this as
# claude's FIRST prompt — JUST an emoji, so nothing readable shows in the user's
# face; the window wakes silently. The full wake instructions (read the note,
# arm the ear, choose next wake) are injected by marrow's UserPromptSubmit hook
# when this exact emoji is submitted in a cortex window.
wake_prompt = "☀️"
# Bell marker the marrow UserPromptSubmit hook detects to inject the full wakeup
# note. The signal line is a BELL ONLY: "<marker> HH:MM" (local), no note body,
# no read errand. rearm_suffix is appended when the ear died and the pacemaker
# re-types the marker into an alive window (ladder 2a).
wake_signal_marker = "[CORTEX-WAKE]"
rearm_suffix = " (ear died — rearm)"
# say() = the ONLY place cortex takes focus: it fronts the resident window and
# plays a system sound (name of a /System/Library/Sounds/*.aiff; "" = silent).
say_sound = "Glass"
wait_max_per_wake = 0       # max wait() calls per wake (0 = uncapped; night gate / 150k fuse / grace / user return backstop)
wait_min = 16               # wait(N) clamp lower bound (minutes) — floor > silence gate (15) keeps wait "post-gate renewal"
wait_max = 55               # wait(N) clamp upper bound (minutes) — hot cache-TTL guard
next_wake_min = 90          # lie_down(next_wake_min=N) clamp lower bound (minutes)
next_wake_rotate_min = 16   # rotate short-sleep clamp lower bound ("context full, back in N min")
next_wake_max = 360         # lie_down(next_wake_min=N) clamp upper bound (minutes)
sentinel = true             # arm cortex.sentinel (one-shot exact-time wake) at every lie_down; false = tick-only fallback
# Free-round marker appended to wake_signal.log at the silence gate or a wait(N)-
# expiry. {mins} = real minutes since the user's last message; {user} = marrow
# user_name (fallback "the user"). No-user tier gets no marker.
tuck_in_text = "⏳ [NEW ROUND] {mins} min since {user}'s last message. Choose again: 1) play around (playbook); 2) wait(N) (16-55min); 3) lie_down(next_wake_min=N) (90-360min). Feel free to do anything. No need to wait for reply - {user} will wake you the moment she's back."
# Line-start markers identifying a NON-user turn down the ear channel (so they
# don't reset the silence timer). wake_signal_marker is added automatically.
machine_line_markers = ["[TUCK-IN]", "[NEW ROUND]", "[NIGHT]"]
wait_expiry_note = true      # on a wait(N)-expiry free-round, append a freshly rendered wakeup note (note content only)

# Per-wake watchdog thresholds (spawned at injection, killed at lie_down).
[wake.watchdog]
poll_sec = 60
silent_max_min = 15            # chat tier: user replied this wake -> at this silence, append free-round marker (no live wait_until)
no_user_gate_min = 5           # no-user tier: no user reply this wake -> at this silence, proxy lie_down(auto) directly, no marker
tuck_grace_min = 5             # after TUCK-IN, no wait/lie_down within this -> proxy lie_down(auto)
fuse_tokens = 150000           # (c) window tokens >= this -> esc + proxy lie_down (fuse)
# Process-level hard interrupt (SIGINT), a guaranteed esc-equivalent for when the
# osascript esc may not land (no window focus). Fires after esc on the fuse
# path, only if the transcript is still growing past the grace window.
hard_interrupt_enabled = true
hard_interrupt_grace_sec = 30
# On the fuse path, after esc the session is prompted to write its handoff and
# lie_down(rotate=True). It gets this many seconds to do so itself before the
# force path (SIGINT + proxy lie_down) fires. Hard deadline — the fuse never hangs.
fuse_handoff_grace_sec = 300
# fuse_handoff_prompt = ""     # override the "write handoff + lie_down" prompt text

# Context-window rotation: lie_down (and the tick fallback) flag a rotate when the
# window grows past this, so the NEXT wake respawns a fresh window (SIGTERM claude
# + fresh spawn — no /clear typing). Cooldown guards the tick fallback from repeats.
[wake.rotate]
threshold_tokens = 100000
cooldown_sec = 600

# Stale-wake guard: tick sees the awake marker but the transcript has been idle
# this long -> presume the watchdog died, proxy lie_down (force_slept=stale).
[wake.stale]
threshold_min = 15

[knowledgec]
# knowledgeC.db ZSTREAMNAME to read app-usage rows from.
stream_name = "/app/usage"

[knowledgec.categories]
# bundle_id = category. Anything not listed here falls under "default" below.
default = "uncategorized"

[geofence]
enabled = false

[health]
enabled = false

# launchd tick cadence (seconds). Baked into the plists at `python -m cortex.install`.
[tick]
collect_interval_sec = 1800    # collectors ~30min
pacemaker_interval_sec = 300   # pacemaker evaluation ~5min
usage_snapshot = true          # OAuth usage % snapshot (marrow subprocess) each tick

# Integration layer knobs (numbers the integration computes and hands the pure pacemaker).
[pacemaker]
dry_run = true                 # log-only; flip to false only once outbound (C5) lands
active_window_min = 5          # activity within this many min => she is in a live session
at_home_default = true         # until geofence-derived location is wired in
cal_busy_default = false       # until calendar busy state is wired in

[gates]
# Night window: zero self-wakes 23-06 (floor/self_scheduled/affect_flag all
# silent). cap = 0 = no self-wake at night.
[gates.night]
start = "23:00"
end = "06:00"
cap = 0
# Wrap-up instruction injected once (after the current turn) into a still-awake
# resident window when the night window opens: it writes its handoff and lies
# down. Once down, the session is marked non-resumable so the first post-night
# wake is a plain fresh spawn that reads the handoff via SessionStart.
close_prompt = "Night window is open. Write your handoff entry now, then call lie_down to end this wake."
# Daily wake-token budget: once today's SUM(NET spend — cache-miss rewrite +
# output, ct_wake_log.net_tokens with a tokens fallback) reaches tokens,
# self-wakes stop; resets naturally at local midnight.
# Net semantics — cache reads are near-free, net is the real cost.
[gates.daily_budget]
tokens = 1000000

[triggers]
# Wake-window (minutes) from lie-down. lie_down picks the next wake: an explicit
# minutes choice (clamped to [min, max]) or a uniform "dice" draw when omitted.
# max = cache-TTL guard (also caps a model-declared cortex.wait); min = anti-thrash.
floor_min_min = 10             # wake-window draw lower bound (uniform lo / clamp min)
floor_max_min = 55             # wake-window draw upper bound (uniform hi / clamp max)

# Wakeup note knobs. Every line is deterministic now, so the old whole-note
# max_chars cap is gone; per-source limits below keep each line bounded.
# Persona/display strings + behaviour (identity stays in config).
[note]
title = ""                   # first line of the wakeup note, e.g. a nickname for the note; empty hides it
replay_events = 6            # trailing user/assistant events in the replay section
replay_event_chars = 300     # per-event truncation in the replay section
replay_exclude_channels = ["ct"]  # channels excluded from replay (ct = cortex self-talk); [] to include all
daily_budget = 1000000       # daily wake-token (NET spend) budget the "today X/Y" line renders against; must match gates.daily_budget.tokens
pending_window_min = 15      # surface a self-schedule entry only when due within this window
handoff_title = "碎碎念"   # title of the handoff-note section (customisable display name)
replay_title = "最近对话回放"     # title of the conversation-replay section
handoff_wake_kinds = ["rotate"]  # wake kinds that get the handoff (fresh window only)
cadence_bin = ""             # cadence CLI for cal/rem lines; empty = packaged default path
turn_end_text = "NOTE: Call MCP tool to wait or lie_down at the end of each turn. Wait=wait(N) [N=16-55]; sleep=lie_down(next_wake_min=N) [90-360; rotate=True unlocks ≥16]. Skip call = sleep in 5 mins. Auto timer is on during active chat - no call needed."  # one-line reminder appended at the end of every rendered note; "" omits it
# Header written into a freshly-created wishlist.md (append-only; never overwritten). Display text — customise freely.
wishlist_header = "# Wishlist\n\n(owed treats / wants / self-rewards — append-only)\n"
